name: Automacao de Conteudo C1IA

on:
  schedule:
    # Executa segunda, quarta e sexta às 12:00 UTC (09:00 Horário de Brasília)
    - cron: '0 12 * * 1,3,5'
  # Permite o disparo manual direto pelo botão "Run workflow"
  workflow_dispatch:

jobs:
  executar_esteira:
    runs-on: ubuntu-latest
    
    # Força o ambiente a herdar todas as credenciais cadastradas nos Secrets
    environment: production

    steps:
    # 1. Copia os seus arquivos usando a versão estável do checkout
    - name: Checkout do codigo
      uses: actions/checkout@v4

    # 2. Prepara o Python na máquina virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Instala o gerenciador de pacotes e as bibliotecas do CrewAI e Google
    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install crewai crewai-tools google-api-python-client

    # 4. Passagem direta das variáveis globais oficiais requeridas pelo CrewAI
    - name: Rodar Agentes de IA
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        C1IA_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python c1ia_agents.py
