name: Automacao de Conteudo C1IA

on:
  schedule:
    # Executa segunda, quarta e sexta às 12:00 UTC (09:00 Horário de Brasília)
    - cron: '0 12 * * 1,3,5'
  # Permite o disparo manual direto pelo botão "Run workflow" no painel do GitHub
  workflow_dispatch:

jobs:
  executar_esteira:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia os seus arquivos para a máquina virtual do GitHub (Atualizado para v4)
    - name: Checkout do codigo
      uses: actions/checkout@v4

    # 2. Prepara o Python na máquina virtual (Atualizado para v5)
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Instala o gerenciador de pacotes e as bibliotecas do CrewAI e Google
    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install crewai crewai-tools google-api-python-client

    # 4. Injeta os Secrets de forma segura e roda o script principal
    - name: Rodar Agentes de IA
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python c1ia_agents.py
