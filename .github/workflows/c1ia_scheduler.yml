name: Automacao de Conteudo C1IA

on:
  schedule:
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch:

jobs:
  executar_esteira:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install crewai crewai-tools google-api-python-client

    - name: Rodar Agentes de IA
      env:
        # Mudamos o nome aqui para o GitHub passar o valor bruto sem mascarar antes da hora
        C1IA_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python c1ia_agents.py
